<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" fill="#000000"/>
  
  <!-- Top Left (Blue Joy-Con shape) -->
  <rect x="30" y="20" width="50" height="80" rx="10" fill="#00AEEF" stroke="white" stroke-width="6"/>
  
  <!-- Top Right (Orange dot) -->
  <circle cx="130" cy="50" r="20" fill="#FF6900" stroke="white" stroke-width="6"/>
  
  <!-- Bottom Left (Large Orange Joy-Con) -->
  <rect x="20" y="100" width="80" height="80" rx="15" fill="#FF6900" stroke="white" stroke-width="6"/>
  
  <!-- Bottom Right (Blue Joy-Con shape) -->
  <rect x="110" y="100" width="50" height="80" rx="10" fill="#00AEEF" stroke="white" stroke-width="6"/>
  
  <!-- Center N -->
  <text x="100" y="115" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="60" fill="#00AEEF" stroke="white" stroke-width="4">N</text>
</svg>
